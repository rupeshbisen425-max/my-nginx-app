apiVersion: apps/v1

kind: Deployment

metadata:
  name: myapp

spec:
  replicas: 3

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:

      containers:

      - name: myapp

        image: dockerhub-user/myapp:latest

        ports:

        - containerPort: 80
